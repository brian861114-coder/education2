<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Phonics World - Tr. Mimi's Class</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icons (SVG Components) ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"/></IconWrapper>;
        const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></IconWrapper>;
        const MessageSquare = (props) => <IconWrapper {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconWrapper>;
        const ChevronRight = (props) => <IconWrapper {...props}><path d="m9 18 6-6-6-6"/></IconWrapper>;
        const ChevronLeft = (props) => <IconWrapper {...props}><path d="m15 18-6-6 6-6"/></IconWrapper>;
        const Home = (props) => <IconWrapper {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
        const Volume2 = (props) => <IconWrapper {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconWrapper>;
        const Loader2 = (props) => <IconWrapper {...props} className={`${props.className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconWrapper>;
        const Star = (props) => <IconWrapper {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const Heart = (props) => <IconWrapper {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>;

        const { useState, useEffect } = React;

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeGroup, setActiveGroup] = useState(null);
            const [step, setStep] = useState(0);
            const [isSpeaking, setIsSpeaking] = useState(null);

            const apiKey = ""; // 填入 API Key 即可同步高品質聲音

            const phonicsData = {
                short_e: {
                    title: "Short e (/ɛ/)",
                    rule: "短母音 e 發音像是 /ɛ/！嘴巴微微張開，嘴角向兩邊拉一點點，像在微笑。",
                    ruleHint: "通常出現在兩個子音中間 (CVC)，像是 E-g-g 或是 B-e-d。",
                    accentColor: "bg-emerald-400",
                    textColor: "text-emerald-600",
                    words: [
                        { word: "Bed", trans: "床", icon: "🛏️" },
                        { word: "Egg", trans: "雞蛋", icon: "🥚" },
                        { word: "Pen", trans: "原子筆", icon: "🖊️" },
                        { word: "Red", trans: "紅色", icon: "🔴" },
                        { word: "Net", trans: "網子", icon: "🕸️" }
                    ],
                    comparisons: [
                        { id: 'se1', pair: "Pet vs. Pete", sentence: "Pete has a small pet dog.", trans: "皮特有一隻小寵物狗。" },
                        { id: 'se2', pair: "Them vs. Theme", sentence: "The theme park is for them.", trans: "那個主題樂園是給他們玩的。" },
                        { id: 'se3', pair: "Met vs. Mete", sentence: "We met to mete out the candy.", trans: "我們見面是為了分配糖果。" }
                    ]
                },
                long_e_e: {
                    title: "Long e-e (/iː/)",
                    rule: "長母音 e 發字母本身的音 /iː/！就像你在說 'Easy' 的開頭一樣。",
                    ruleHint: "當字尾出現 Magic e，它會把前面的 e 變成長長的 /iː/ 喔！",
                    accentColor: "bg-violet-400",
                    textColor: "text-violet-600",
                    words: [
                        { word: "Pete", trans: "皮特(人名)", icon: "👦" },
                        { word: "Eve", trans: "夏娃(人名)", icon: "👧" },
                        { word: "These", trans: "這些", icon: "👈" },
                        { word: "Gene", trans: "基因", icon: "🧬" },
                        { word: "Theme", trans: "主題", icon: "🎨" }
                    ],
                    comparisons: [
                        { id: 'le1', pair: "Pet vs. Pete", sentence: "Is that pet for Pete?", trans: "那隻寵物是給皮特的嗎？" },
                        { id: 'le2', pair: "Them vs. These", sentence: "Give these toys to them.", trans: "把這些玩具給他們。" },
                        { id: 'le3', pair: "Steve vs. Step", sentence: "Steve took a big step.", trans: "史蒂夫跨出了一大步。" }
                    ]
                }
            };

            const nextStep = () => {
                if (step < 2) setStep(step + 1);
                else setCurrentPage('home');
            };

            const prevStep = () => {
                if (step > 0) setStep(step - 1);
                else setCurrentPage('home');
            };

            const pcmToWav = (pcmBase64, sampleRate = 24000) => {
                const binaryString = window.atob(pcmBase64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                const buffer = bytes.buffer;
                const wavBuffer = new ArrayBuffer(44 + buffer.byteLength);
                const wavView = new DataView(wavBuffer);
                const writeString = (view, offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(wavView, 0, 'RIFF');
                wavView.setUint32(4, 36 + buffer.byteLength, true);
                writeString(wavView, 8, 'WAVE');
                writeString(wavView, 12, 'fmt ');
                wavView.setUint32(16, 16, true);
                wavView.setUint16(20, 1, true);
                wavView.setUint16(22, 1, true);
                wavView.setUint32(24, sampleRate, true);
                wavView.setUint32(28, sampleRate * 2, true);
                wavView.setUint16(32, 2, true);
                wavView.setUint16(34, 16, true);
                writeString(wavView, 36, 'data');
                wavView.setUint32(40, buffer.byteLength, true);
                new Uint8Array(wavBuffer, 44).set(new Uint8Array(buffer));
                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                return URL.createObjectURL(blob);
            };

            const handleSpeak = async (text, id) => {
                if (isSpeaking) return;
                setIsSpeaking(id);

                const hasChinese = /[\u4e00-\u9fa5]/.test(text);
                let speechText = text;
                const ipaMap = {
                    '/ɛ/': 'short e sound',
                    '/iː/': 'long e sound',
                    '/æ/': 'short a sound',
                    '/eɪ/': 'long a sound'
                };
                Object.keys(ipaMap).forEach(key => { speechText = speechText.split(key).join(ipaMap[key]); });

                // 如果有 API Key，嘗試雲端高品質發音
                if (apiKey) {
                    try {
                        const prompt = hasChinese 
                            ? `請用親切、標準的繁體中文（台灣口音）朗讀以下內容，如果是括號內的英文說明請直接讀出來：${speechText}`
                            : `Say clearly and naturally in English: ${speechText}`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                                }
                            })
                        });
                        const result = await response.json();
                        const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        if (pcmData) {
                            const audio = new Audio(pcmToWav(pcmData));
                            audio.onended = () => setIsSpeaking(null);
                            audio.play();
                            return; // 成功播放後退出
                        }
                    } catch (e) { console.error("Cloud TTS failed, using fallback."); }
                }

                // --- Fallback: Optimized Browser TTS ---
                const u = new SpeechSynthesisUtterance(speechText);
                u.lang = hasChinese ? 'zh-TW' : 'en-US';
                u.rate = 0.85;

                // 嘗試挑選高品質的本機聲音
                const voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    // 優先找 Google 或 Premium 系列的聲音
                    const targetVoice = voices.find(v => 
                        v.lang.includes(u.lang.replace('-', '_')) && 
                        (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Natural'))
                    );
                    if (targetVoice) u.voice = targetVoice;
                }

                u.onend = () => setIsSpeaking(null);
                window.speechSynthesis.speak(u);
            };

            // 預載聲音列表 (修正部分瀏覽器延遲加載聲音的問題)
            useEffect(() => { window.speechSynthesis.getVoices(); }, []);

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-8 space-y-12 bg-yellow-50 text-slate-800">
                    <div className="text-center space-y-6">
                        <div className="flex justify-center gap-4 mb-2">
                            <Heart className="text-pink-400 fill-pink-400 animate-pulse" size={48} />
                            <Star className="text-yellow-400 fill-yellow-400 animate-bounce-slow" size={56} />
                            <Heart className="text-pink-400 fill-pink-400 animate-pulse" size={48} />
                        </div>
                        <h1 className="text-5xl md:text-8xl font-black tracking-tight text-emerald-600 drop-shadow-md">
                            Magic 'e' World
                        </h1>
                        <p className="text-xl md:text-3xl text-emerald-800/70 font-bold bg-white/60 py-2 px-8 rounded-full inline-block border-2 border-emerald-100">
                            一起來學習短母音與長母音 e 吧！
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 w-full max-w-4xl px-4">
                        {Object.entries(phonicsData).map(([key, data]) => (
                            <button
                                key={key}
                                onClick={() => { setActiveGroup(key); setStep(0); setCurrentPage('lesson'); }}
                                className={`group bg-white border-4 border-dashed border-emerald-200 hover:border-emerald-400 rounded-[3rem] p-8 md:p-12 transition-all duration-300 hover:scale-105 shadow-xl hover:shadow-2xl relative overflow-hidden`}
                            >
                                <div className={`absolute -right-4 -top-4 w-24 h-24 rounded-full ${data.accentColor} opacity-20`} />
                                <div className="text-6xl md:text-8xl mb-6">{key === 'short_e' ? '🥚' : '👦'}</div>
                                <div className={`text-3xl md:text-5xl font-black mb-2 ${data.textColor}`}>
                                    {data.title}
                                </div>
                                <div className="text-xl md:text-2xl text-slate-500 font-medium">
                                    點擊進入冒險
                                </div>
                            </button>
                        ))}
                    </div>
                    
                    <div className="mt-8 flex items-center gap-4 text-emerald-900/40 font-bold text-lg bg-white/40 px-6 py-2 rounded-full">
                        <Sparkles /> 適合大螢幕播放，內含智慧語音選取 <Sparkles />
                    </div>
                </div>
            );

            const renderLesson = () => {
                const data = phonicsData[activeGroup];
                if (!data) return null;

                return (
                    <div className="flex flex-col min-h-screen bg-yellow-50 text-slate-800">
                        {/* Progress Header */}
                        <div className="flex items-center justify-between p-4 md:p-8 bg-white/80 border-b-4 border-emerald-100 backdrop-blur-sm">
                            <button onClick={() => setCurrentPage('home')} className="flex items-center gap-2 text-xl md:text-2xl font-bold text-emerald-600 hover:text-orange-400 transition-colors">
                                <Home size={32} /> 回主選單
                            </button>
                            <div className="hidden md:flex gap-4">
                                {[0, 1, 2].map((s) => (
                                    <div key={s} className={`h-4 w-20 rounded-full transition-all duration-300 ${step >= s ? data.accentColor : 'bg-emerald-50'}`} />
                                ))}
                            </div>
                            <div className={`text-2xl md:text-4xl font-black ${data.textColor}`}>{data.title}</div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 flex flex-col items-center justify-center p-4 md:p-8 overflow-y-auto">
                            <div className="w-full max-w-6xl bg-white/95 p-6 md:p-12 rounded-[2rem] md:rounded-[4rem] shadow-2xl border-4 border-white relative overflow-hidden">
                                <div className={`absolute -bottom-20 -right-20 w-80 h-80 rounded-full ${data.accentColor} opacity-5 blur-3xl`} />
                                
                                {step === 0 && (
                                    <div className="text-center space-y-10 animate-in zoom-in duration-500 relative z-10">
                                        <div className={`${data.accentColor} inline-block p-6 rounded-full text-white mb-4 shadow-lg`}>
                                            <Sparkles size={64} />
                                        </div>
                                        <h2 className="text-5xl md:text-7xl font-black text-slate-700">發音規則</h2>
                                        <div className="space-y-6">
                                            <p className="text-3xl md:text-5xl leading-relaxed font-bold px-4 md:px-12">
                                                {data.rule}
                                            </p>
                                            <div className="bg-emerald-50 p-6 md:p-8 rounded-3xl border-2 border-emerald-100 inline-block">
                                                <p className="text-2xl md:text-3xl text-emerald-900/70 italic font-bold">💡 {data.ruleHint}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => handleSpeak(data.rule, 'rule')}
                                            className="mt-6 flex items-center gap-4 mx-auto px-8 py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl text-xl md:text-2xl font-bold transition-all hover:scale-105 shadow-sm"
                                        >
                                            {isSpeaking === 'rule' ? <Loader2 className="text-emerald-500" /> : <Volume2 className="text-emerald-500" />} 聽規則發音
                                        </button>
                                    </div>
                                )}

                                {step === 1 && (
                                    <div className="animate-in slide-in-from-right duration-500 relative z-10">
                                        <h2 className="text-4xl md:text-6xl font-black text-center mb-8 md:mb-16 flex items-center justify-center gap-6">
                                            <BookOpen size={56} className={data.textColor} /> 精選單字卡
                                        </h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                            {data.words.map((item, idx) => (
                                                <div key={idx} className="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border-4 border-emerald-50 shadow-lg hover:shadow-2xl transition-all group relative">
                                                    <button onClick={() => handleSpeak(item.word, `w-${idx}`)} className={`absolute top-6 right-6 p-4 rounded-2xl ${isSpeaking === `w-${idx}` ? 'bg-emerald-400 text-white' : 'bg-emerald-50 text-emerald-400 shadow-sm group-hover:scale-110'}`}>
                                                        {isSpeaking === `w-${idx}` ? <Loader2 size={32} /> : <Volume2 size={32} />}
                                                    </button>
                                                    <div className="text-6xl md:text-8xl mb-4 md:mb-6">{item.icon}</div>
                                                    <div className={`text-4xl md:text-6xl font-black mb-2 ${data.textColor}`}>{item.word}</div>
                                                    <div className="text-2xl md:text-3xl text-slate-400 font-bold">{item.trans}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="animate-in slide-in-from-bottom duration-500 relative z-10">
                                        <h2 className="text-4xl md:text-6xl font-black text-center mb-8 md:mb-16 flex items-center justify-center gap-6">
                                            <MessageSquare size={56} className={data.textColor} /> 混淆字對抗賽！
                                        </h2>
                                        <div className="space-y-6 md:space-y-10">
                                            {data.comparisons.map((item, idx) => (
                                                <div key={idx} className="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border-4 border-emerald-50 shadow-xl relative group flex flex-col md:flex-row items-center gap-6 md:gap-8">
                                                    <div className="flex-1 text-center md:text-left">
                                                        <div className={`text-2xl md:text-3xl font-black mb-2 md:mb-4 uppercase tracking-widest ${data.textColor}`}>{item.pair}</div>
                                                        <p className="text-3xl md:text-5xl font-black leading-tight mb-2 md:mb-4 text-slate-700">
                                                            {item.sentence.split(' ').map((word, i) => {
                                                                const lower = word.toLowerCase().replace(/[^a-z-]/g, '');
                                                                const targets = ['bed', 'egg', 'pen', 'red', 'net', 'pete', 'eve', 'these', 'gene', 'theme', 'pet', 'them', 'met', 'mete', 'steve', 'step'];
                                                                const isTarget = targets.includes(lower);
                                                                return <span key={i} className={isTarget ? "text-emerald-500 underline underline-offset-8 mx-1 md:mx-2" : "mx-1 md:mx-2"}>{word}</span>;
                                                            })}
                                                        </p>
                                                        <p className="text-xl md:text-3xl text-slate-400 font-bold">{item.trans}</p>
                                                    </div>
                                                    <button onClick={() => handleSpeak(item.sentence, item.id)} className={`p-6 md:p-8 rounded-3xl transition-all ${isSpeaking === item.id ? 'bg-emerald-400 text-white animate-pulse' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100 shadow-md'}`}>
                                                        {isSpeaking === item.id ? <Loader2 size={48} /> : <Volume2 size={48} />}
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Footer Navigation */}
                        <div className="p-4 md:p-8 flex justify-between bg-white/50 backdrop-blur-sm">
                            <button onClick={prevStep} className="px-6 md:px-12 py-4 md:py-6 bg-white border-4 border-orange-100 rounded-3xl text-xl md:text-3xl font-black text-emerald-400 shadow-md hover:bg-emerald-50 transition-all flex items-center gap-3">
                                <ChevronLeft size={40} /> 上一頁
                            </button>
                            <button onClick={nextStep} className={`px-8 md:px-16 py-4 md:py-6 ${data.accentColor} rounded-3xl text-xl md:text-3xl font-black text-white shadow-xl hover:opacity-90 transition-all flex items-center gap-3`}>
                                {step === 2 ? "結束本課" : "下一頁"} <ChevronRight size={40} />
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="font-sans selection:bg-emerald-100">
                    {currentPage === 'home' ? renderHome() : renderLesson()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
