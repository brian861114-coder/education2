<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法拼音島 - 雲端互動課程</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .btn-shadow { box-shadow: 0 8px 0 rgba(0,0,0,0.1); transition: all 0.1s; }
        .btn-shadow:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-orange-50">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 1. 圖示庫 (Icons) ---
        const Icons = {
            Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Volume2: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Star: () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            ArrowRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
            CloudDownload: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.89 4.08 15a.5.5 0 0 0 .1.34C4.67 16.2 5.76 17 7 17h10c1.24 0 2.33-.8 2.82-1.66a.5.5 0 0 0 .1-.34l.08-.11A5 5 0 0 0 15 5c-.32 0-.64.03-.95.09a7 7 0 1 0-10.05 9.8"/></svg>,
            Check: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        };

        // --- 2. 靜態教學資料 ---
        const WORDS_DATA = [
            { t: 'Cat', e: '🐱', type: 'short' }, { t: 'Hat', e: '👒', type: 'short' },
            { t: 'Jam', e: '🍓', type: 'short' }, { t: 'Map', e: '🗺️', type: 'short' },
            { t: 'Cake', e: '🍰', type: 'long' }, { t: 'Lake', e: '🏞️', type: 'long' },
            { t: 'Name', e: '🏷️', type: 'long' }, { t: 'Game', e: '🎮', type: 'long' }
        ];

        const SENTENCES_DATA = [
            { p: "Cap vs. Cape", s: "Put on your cap and wear your cape.", z: "戴上帽子，穿上斗篷。", i: "🦸‍♂️" },
            { p: "Mat vs. Mate", s: "My mate is sitting on a mat.", z: "我的夥伴坐在墊子上。", i: "🤝" },
            { p: "Tap vs. Tape", s: "Tap the box to get the tape.", z: "敲敲盒子拿膠帶。", i: "📦" }
        ];

        // --- 3. 輔助函式 ---
        const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/[/+=]/g, '_');

        const pcmToWav = (pcmBase64, sampleRate = 24000) => {
            const byteCharacters = atob(pcmBase64);
            const buffer = new ArrayBuffer(byteCharacters.length);
            const view = new Uint8Array(buffer);
            for (let i = 0; i < byteCharacters.length; i++) view[i] = byteCharacters.charCodeAt(i);
            const wavHeader = new ArrayBuffer(44);
            const headerView = new DataView(wavHeader);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) headerView.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF'); headerView.setUint32(4, 32 + buffer.byteLength, true);
            writeString(8, 'WAVE'); writeString(12, 'fmt ');
            headerView.setUint32(16, 16, true); headerView.setUint16(20, 1, true);
            headerView.setUint16(22, 1, true); headerView.setUint32(24, sampleRate, true);
            headerView.setUint32(28, sampleRate * 2, true); headerView.setUint16(32, 2, true);
            headerView.setUint16(34, 16, true); writeString(36, 'data');
            headerView.setUint32(40, buffer.byteLength, true);
            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        };

        // --- 4. 主程式 App ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [user, setUser] = useState(null);
            const [audioStatus, setAudioStatus] = useState({});
            const [db, setDb] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");

            // API 與 Firebase 設定
            const apiKey = ""; // 設為空字串，系統將自動注入 API 金鑰
            const appId = 'phonics-course-a-web';
            
            const firebaseConfig = {
                apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
                authDomain: "education-b38d5.firebaseapp.com",
                projectId: "education-b38d5",
                storageBucket: "education-b38d5.firebasestorage.app",
                messagingSenderId: "450320441540",
                appId: "1:450320441540:web:888014b1380a473a142991"
            };

            // 初始化 Firebase
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (window.FB) {
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const auth = window.FB.getAuth(app);
                            const firestore = window.FB.getFirestore(app);
                            setDb(firestore);

                            window.FB.onAuthStateChanged(auth, (u) => {
                                if (u) setUser(u);
                                else window.FB.signInAnonymously(auth).catch(e => setErrorMsg("連線錯誤: " + e.message));
                            });
                        } catch (e) { setErrorMsg("Firebase 初始化失敗: " + e.message); }
                    }
                }, 500);
                return () => clearTimeout(timer);
            }, []);

            // 語音播放與快取邏輯
            const speak = async (text) => {
                if (isSpeaking) return;
                const safeId = getSafeId(text);
                let audioData = null;

                setAudioStatus(prev => ({ ...prev, [text]: 'loading' }));
                setIsSpeaking(true);

                try {
                    // 1. 優先從雲端資料庫抓取已生成的語音
                    if (db && user) {
                        const audioPath = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio_cache', safeId);
                        const cacheSnap = await window.FB.getDoc(audioPath);
                        if (cacheSnap.exists()) audioData = cacheSnap.data().base64;
                    }

                    // 2. 沒快取則調用 Gemini TTS API 生成
                    if (!audioData) {
                        // 【修復】使用正確的 TTS 語音模型：gemini-2.5-flash-preview-tts
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: text }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                                }
                            })
                        });
                        
                        if (!response.ok) throw new Error(`語音生成失敗 (${response.status})`);
                        
                        const result = await response.json();
                        audioData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        
                        if (!audioData) throw new Error("API 未回傳音訊資料");

                        // 3. 生成成功後，存回 Firebase 永久保存
                        if (audioData && db && user) {
                            const audioPath = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio_cache', safeId);
                            setAudioStatus(prev => ({ ...prev, [text]: 'caching' }));
                            await window.FB.setDoc(audioPath, { base64: audioData, text: text, createdAt: new Date().toISOString() });
                        }
                    }

                    // 4. 將 PCM 轉為 WAV 並播放
                    if (audioData) {
                        const audioBlob = pcmToWav(audioData);
                        const audioUrl = URL.createObjectURL(audioBlob);
                        const audio = new Audio(audioUrl);
                        setAudioStatus(prev => ({ ...prev, [text]: 'playing' }));
                        
                        audio.onended = () => {
                            setIsSpeaking(false);
                            setAudioStatus(prev => ({ ...prev, [text]: 'idle' }));
                            URL.revokeObjectURL(audioUrl);
                        };
                        audio.onerror = () => { throw new Error("音訊播放發生錯誤"); };
                        audio.play();
                    }
                } catch (error) {
                    setErrorMsg(error.message);
                    setIsSpeaking(false);
                    setAudioStatus(prev => ({ ...prev, [text]: 'idle' }));
                }
            };

            // 狀態圖示小元件
            const StatusIcon = ({ text }) => {
                const status = audioStatus[text];
                if (status === 'loading') return <Icons.CloudDownload className="animate-bounce text-blue-400" />;
                if (status === 'caching') return <Icons.Check className="animate-pulse text-green-500" />;
                if (status === 'playing') return <Icons.Volume2 className="animate-ping text-orange-500" />;
                return <Icons.Volume2 className="text-gray-400" />;
            };

            // 共用外框組件
            const PageContainer = ({ children, title }) => (
                <div className="min-h-screen bg-orange-50 p-4 md:p-10 flex flex-col items-center">
                    {errorMsg && (
                        <div className="w-full max-w-5xl mb-4 bg-red-50 border-2 border-red-200 text-red-700 p-4 rounded-3xl flex items-center gap-3 shadow-md">
                            <Icons.Alert />
                            <div className="flex-1 text-sm"><p className="font-bold">狀態提示</p><p>{errorMsg}</p></div>
                            <button onClick={() => setErrorMsg("")} className="text-xs bg-white px-2 py-1 rounded-lg">關閉</button>
                        </div>
                    )}
                    <div className="w-full max-w-5xl bg-white rounded-[3rem] shadow-2xl border-8 border-yellow-200 overflow-hidden relative">
                        <div className="bg-yellow-100 p-6 flex justify-between items-center border-b-4 border-yellow-200">
                            <button onClick={() => setCurrentPage('home')} className="flex items-center gap-2 bg-white px-5 py-2 rounded-full font-bold text-orange-600 hover:bg-orange-50 shadow-sm transition-all"><Icons.Home /> 首頁</button>
                            <h1 className="text-2xl md:text-3xl font-black text-orange-600 truncate px-4">{title}</h1>
                            <div className={`text-xs font-bold px-3 py-1 rounded-full ${user ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600 animate-pulse'}`}>
                                {user ? "● 雲端連線成功" : "○ 雲端連線中..."}
                            </div>
                        </div>
                        <div className="p-8 md:p-12 overflow-y-auto max-h-[70vh]">
                            {children}
                        </div>
                    </div>
                </div>
            );

            // --- 頁面渲染區塊 (結構優化) ---
            const renderHome = () => (
                <div className="min-h-screen bg-orange-50 flex flex-col items-center justify-center p-4">
                    <div className="max-w-4xl w-full bg-white rounded-[4rem] shadow-2xl border-8 border-yellow-300 p-12 text-center relative overflow-hidden">
                        <h1 className="text-6xl md:text-8xl font-black text-orange-500 mb-4 tracking-tighter">魔法拼音島</h1>
                        <p className="text-2xl md:text-3xl text-gray-600 mb-10 font-bold italic">自動雲端快取版</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
                            <button onClick={() => setCurrentPage('rules')} className="bg-pink-400 hover:scale-105 transform transition-all text-white p-10 rounded-[2.5rem] shadow-xl flex flex-col items-center gap-6 border-b-8 border-black border-opacity-10 btn-shadow">
                                <Icons.BookOpen /> <span className="text-2xl font-black">1. 規則說明</span>
                            </button>
                            <button onClick={() => setCurrentPage('words')} className="bg-yellow-400 hover:scale-105 transform transition-all text-white p-10 rounded-[2.5rem] shadow-xl flex flex-col items-center gap-6 border-b-8 border-black border-opacity-10 btn-shadow">
                                <Icons.Star /> <span className="text-2xl font-black">2. 常見例字</span>
                            </button>
                            <button onClick={() => setCurrentPage('sentences')} className="bg-green-400 hover:scale-105 transform transition-all text-white p-10 rounded-[2.5rem] shadow-xl flex flex-col items-center gap-6 border-b-8 border-black border-opacity-10 btn-shadow">
                                <Icons.Play /> <span className="text-2xl font-black">3. 例句挑戰</span>
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderRules = () => (
                <PageContainer title="第一站：規則說明">
                    <div className="space-y-10">
                        <div className="bg-pink-50 p-10 rounded-[3rem] border-4 border-pink-200">
                            <h2 className="text-4xl font-black text-pink-600 mb-8 flex items-center gap-4 underline underline-offset-8">短母音 Short 'a' (/æ/)</h2>
                            <div className="flex flex-col md:flex-row items-center gap-10">
                                <div className="text-9xl bg-white p-10 rounded-3xl shadow-inner border border-pink-100 animate-pulse">🍎</div>
                                <div className="text-3xl leading-relaxed flex-1 font-bold text-pink-800">
                                    嘴巴張大發出短音 /æ/。<br/>
                                    <button onClick={() => speak("Short a, says ah, like in apple.")} className="mt-8 flex items-center gap-4 bg-pink-500 text-white px-10 py-4 rounded-full hover:bg-pink-600 shadow-xl font-black text-2xl transition-all active:scale-95 btn-shadow">
                                        <StatusIcon text="Short a, says ah, like in apple." /> 播放發音
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="bg-blue-50 p-10 rounded-[3rem] border-4 border-blue-200">
                            <h2 className="text-4xl font-black text-blue-600 mb-8 flex items-center gap-4 underline underline-offset-8">長母音 Long 'a' (/eɪ/)</h2>
                            <div className="flex flex-col md:flex-row items-center gap-10">
                                <div className="text-9xl bg-white p-10 rounded-3xl shadow-inner border border-blue-100 animate-pulse">🍰</div>
                                <div className="text-3xl leading-relaxed flex-1 font-bold text-blue-800">
                                    魔法 'e' 讓 'a' 發名字音 /eɪ/。<br/>
                                    <button onClick={() => speak("Long a, says ay, like in cake. The magic e makes the sound.")} className="mt-8 flex items-center gap-4 bg-blue-500 text-white px-10 py-4 rounded-full hover:bg-blue-600 shadow-xl font-black text-2xl transition-all active:scale-95 btn-shadow">
                                        <StatusIcon text="Long a, says ay, like in cake. The magic e makes the sound." /> 播放發音
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="flex justify-center"><button onClick={() => setCurrentPage('words')} className="bg-orange-500 text-white text-3xl font-black px-16 py-6 rounded-full shadow-2xl hover:scale-105 transition-all">下一關：練習單字 <Icons.ArrowRight /></button></div>
                    </div>
                </PageContainer>
            );

            const renderWords = () => (
                <PageContainer title="第二站：常見例字">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                        {WORDS_DATA.map((w, i) => (
                            <button key={i} onClick={() => speak(w.t)} className={`p-10 rounded-[2.5rem] border-4 ${w.type === 'short' ? 'bg-pink-50 border-pink-200 text-pink-700' : 'bg-blue-50 border-blue-200 text-blue-700'} hover:scale-105 transition-all flex flex-col items-center gap-6 shadow-xl btn-shadow group`}>
                                <span className="text-7xl group-hover:animate-bounce transition-transform">{w.e}</span>
                                <span className="text-4xl font-black">{w.t}</span>
                                <div className="bg-white p-2 rounded-full shadow-inner"><StatusIcon text={w.t} /></div>
                            </button>
                        ))}
                    </div>
                    <div className="flex justify-center mt-12"><button onClick={() => setCurrentPage('sentences')} className="bg-orange-500 text-white text-3xl font-black px-16 py-6 rounded-full shadow-2xl hover:scale-105 transition-all">最後一關：例句大挑戰 <Icons.ArrowRight /></button></div>
                </PageContainer>
            );

            const renderSentences = () => (
                <PageContainer title="第三站：例句挑戰">
                    <div className="space-y-8">
                        {SENTENCES_DATA.map((c, i) => (
                            <div key={i} className="bg-green-50 border-4 border-green-200 p-10 rounded-[3rem] flex flex-col md:flex-row items-center gap-10 shadow-lg">
                                <div className="text-8xl bg-white w-32 h-32 md:w-40 md:h-40 flex items-center justify-center rounded-full shadow-inner border-4 border-green-100">{c.i}</div>
                                <div className="flex-1 text-center md:text-left">
                                    <span className="bg-green-500 text-white px-6 py-2 rounded-full font-black text-2xl mb-4 inline-block">{c.p}</span>
                                    <p className="text-4xl md:text-5xl font-black text-gray-800 leading-tight">{c.s}</p>
                                    <p className="text-2xl md:text-3xl text-gray-500 mt-4 font-bold italic">{c.z}</p>
                                </div>
                                <button onClick={() => speak(c.s)} className="bg-green-500 hover:bg-green-600 text-white p-10 rounded-3xl shadow-xl transition-all active:scale-95 btn-shadow">
                                    <StatusIcon text={c.s} />
                                </button>
                            </div>
                        ))}
                    </div>
                    <div className="mt-12 text-center"><button onClick={() => setCurrentPage('home')} className="text-orange-600 font-black text-2xl hover:underline">← 練習完成，回到首頁</button></div>
                </PageContainer>
            );

            switch (currentPage) {
                case 'home': return renderHome();
                case 'rules': return renderRules();
                case 'words': return renderWords();
                case 'sentences': return renderSentences();
                default: return renderHome();
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
