<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Magic A World - Short A &amp; Long A Phonics</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Noto Sans TC',sans-serif;overflow-x:hidden;background:#fffbf7;min-height:100vh}
@keyframes floatUp{0%{transform:translateY(105vh) rotate(0deg);opacity:.08}50%{opacity:.2}100%{transform:translateY(-12vh) rotate(360deg);opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sparkle{0%,100%{opacity:.7;transform:scale(1) rotate(0)}50%{opacity:1;transform:scale(1.25) rotate(18deg)}}
@keyframes pulseO{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.5)}50%{box-shadow:0 0 0 12px rgba(249,115,22,0)}}
@keyframes pulseV{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.5)}50%{box-shadow:0 0 0 12px rgba(139,92,246,0)}}
@keyframes zoomIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:none}}
@keyframes slideU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes cloudDrift{from{transform:translateX(0)}to{transform:translateX(18px)}}
.bounce{animation:bounce 2.8s ease-in-out infinite}
.sparkle{animation:sparkle 1.8s ease-in-out infinite}
.sparkle2{animation:sparkle 1.8s ease-in-out .9s infinite}
.spin{animation:spin .75s linear infinite;display:inline-block}
.zoom-in{animation:zoomIn .35s ease both}
.slide-r{animation:slideR .38s ease both}
.slide-u{animation:slideU .38s ease both}
.d0{animation-delay:.04s}.d1{animation-delay:.1s}.d2{animation-delay:.16s}
.d3{animation-delay:.22s}.d4{animation-delay:.28s}.d5{animation-delay:.34s}
.deco{position:fixed;pointer-events:none;z-index:0;animation:floatUp linear infinite;opacity:0;user-select:none}
.page{display:none;min-height:100vh;flex-direction:column}
.page.active{display:flex}
/* HOME */
#home{align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden}
#home::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,#fff7ed,#fdf4ff 50%,#f0fdf4);z-index:-1}
.cloud{border-radius:9999px;background:white;opacity:.65;position:absolute;animation:cloudDrift ease-in-out infinite alternate}
.home-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2.5rem;width:100%;max-width:960px}
.site-title{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;line-height:1.1;background:linear-gradient(135deg,#f97316,#ec4899,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:clamp(1.1rem,2.5vw,1.6rem);font-weight:800;color:#475569;background:rgba(255,255,255,.8);padding:.6rem 1.8rem;border-radius:9999px;border:1px solid white}
.home-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem;width:100%}
.home-card{background:white;border-radius:2.5rem;padding:2.5rem;border:4px solid white;box-shadow:0 10px 40px rgba(0,0,0,.1);text-align:left;cursor:pointer;position:relative;overflow:hidden;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
.home-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 60px rgba(0,0,0,.15)}
.home-card:active{transform:scale(.98)}
.card-blob1,.card-blob2{position:absolute;border-radius:50%;pointer-events:none}
.card-blob1{top:-1.5rem;right:-1.5rem;width:8rem;height:8rem;opacity:.15}
.card-blob2{bottom:-1rem;left:-1rem;width:6rem;height:6rem;opacity:.1}
.card-emoji{font-size:4.5rem;display:inline-block;margin-bottom:1.2rem}
.card-title{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;margin-bottom:.25rem}
.card-sub{font-size:1.1rem;font-weight:700;color:#94a3b8;margin-top:.4rem}
.card-cta{margin-top:1.2rem;display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.4rem;border-radius:1rem;font-size:1.15rem;font-weight:900;color:white;border:none;cursor:pointer}
.home-footer{display:flex;align-items:center;gap:.5rem;font-size:.95rem;font-weight:700;color:#94a3b8;background:rgba(255,255,255,.7);padding:.4rem 1.4rem;border-radius:9999px;border:1px solid white}
/* LESSON */
#lesson{background:#fffbf7}
.lesson-bg-o{background:linear-gradient(160deg,#fff7ed,#fffbf0 60%,#fefce8)}
.lesson-bg-v{background:linear-gradient(160deg,#f5f3ff,#fdf4ff 60%,#faf5ff)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;background:rgba(255,255,255,.92);border-bottom:3px solid rgba(255,255,255,.8);box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:0;z-index:20;backdrop-filter:blur(8px)}
.back-btn{display:flex;align-items:center;gap:.4rem;font-weight:900;background:white;padding:.55rem 1.2rem;border-radius:1rem;border:2px solid;cursor:pointer;font-size:clamp(1rem,2vw,1.35rem);transition:transform .15s}
.back-btn:hover{transform:scale(1.04)}
.step-dots{display:flex;align-items:center;gap:.4rem}
.step-dot{height:12px;border-radius:9999px;background:#e5e7eb;transition:all .3s ease}
.step-label{font-size:clamp(.8rem,1.8vw,1.15rem);font-weight:900;background:white;padding:.45rem 1.1rem;border-radius:1rem;border:2px solid}
.lesson-header{padding:1rem 2rem;display:flex;align-items:center;gap:1.25rem;position:relative;overflow:hidden}
.lesson-header::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.3) 1.5px,transparent 1.5px);background-size:24px 24px;pointer-events:none}
.lh-emoji{font-size:clamp(2rem,5vw,3.2rem);position:relative;z-index:1}
.lh-text{position:relative;z-index:1;color:white}
.lh-title{font-size:clamp(1.5rem,4vw,2.8rem);font-weight:900}
.lh-sub{font-size:clamp(.9rem,2vw,1.4rem);font-weight:700;opacity:.85}
.content-wrap{flex:1;overflow-y:auto;padding:2rem 1.5rem}
.content-card{max-width:900px;margin:0 auto;background:rgba(255,255,255,.95);border-radius:2.5rem;padding:2.5rem 2rem;box-shadow:0 20px 60px rgba(0,0,0,.1);border:2px solid rgba(255,255,255,.9);position:relative;overflow:hidden}
.card-glow{position:absolute;bottom:-4rem;right:-4rem;width:16rem;height:16rem;border-radius:50%;opacity:.06;filter:blur(24px);pointer-events:none}
.botbar{display:flex;justify-content:space-between;align-items:center;padding:.9rem 2rem;background:rgba(255,255,255,.92);border-top:3px solid rgba(255,255,255,.8);box-shadow:0 -2px 12px rgba(0,0,0,.05);position:sticky;bottom:0;z-index:20;backdrop-filter:blur(8px)}
.nav-btn{display:flex;align-items:center;gap:.5rem;font-weight:900;cursor:pointer;padding:.7rem 1.8rem;border-radius:1.25rem;font-size:clamp(1rem,2vw,1.45rem);transition:transform .15s;border:none}
.nav-btn:hover{transform:scale(1.04)}
.nav-btn:active{transform:scale(.96)}
.tab-btns{display:flex;gap:.5rem}
.tab-btn{padding:.35rem .85rem;border-radius:.75rem;cursor:pointer;font-size:.95rem;font-weight:700;border:none;transition:all .2s;opacity:.65}
.tab-btn.on{opacity:1;box-shadow:0 2px 8px rgba(0,0,0,.15)}
/* RULE */
.step-rule{display:flex;flex-direction:column;align-items:center;gap:2rem;text-align:center}
.ipa-badge{border-radius:50%;width:8rem;height:8rem;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.2);color:white}
.ipa-main{font-size:1.9rem;font-weight:900;line-height:1}
.ipa-sub{font-size:.85rem;font-weight:700;opacity:.85;margin-top:.2rem}
.rule-text{font-size:clamp(1.4rem,3.2vw,2.2rem);font-weight:900;color:#334155;line-height:1.6;padding:0 .5rem}
.rule-hint{display:inline-block;padding:1.1rem 1.8rem;border-radius:1.5rem;font-size:clamp(1rem,2vw,1.35rem);font-weight:700;color:#475569;border:2px solid}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:700px;width:100%;text-align:left}
.detail-card{background:white;border-radius:1rem;padding:1rem 1.2rem;border:1px solid #f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.detail-label{font-size:.82rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem}
.detail-val{font-size:clamp(.85rem,1.8vw,1.1rem);font-weight:700;color:#475569}
.speak-btn{display:inline-flex;align-items:center;gap:.7rem;padding:.9rem 2.2rem;border-radius:1.25rem;font-size:clamp(1rem,2vw,1.35rem);font-weight:900;cursor:pointer;border:2px solid;transition:all .2s}
/* WORDS */
.step-words{display:flex;flex-direction:column;gap:2rem}
.step-title{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;text-align:center;display:flex;align-items:center;justify-content:center;gap:1rem}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1.2rem}
.word-card{background:white;border-radius:2rem;padding:1.4rem 1.1rem;border:2px solid #f1f5f9;position:relative;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.07);transition:transform .2s ease,box-shadow .2s ease}
.word-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 12px 30px rgba(0,0,0,.12)}
.word-card:active{transform:scale(.97)}
.word-speak{position:absolute;top:.7rem;right:.7rem;padding:.45rem;border-radius:.75rem;border:none;cursor:pointer;transition:all .2s;line-height:0}
.word-icon{font-size:clamp(2.4rem,5vw,3.5rem);margin-bottom:.7rem}
.word-en{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;margin-bottom:.1rem}
.word-ipa{font-size:.92rem;font-weight:700;color:#94a3b8;margin-bottom:.2rem}
.word-zh{font-size:clamp(1rem,2vw,1.3rem);font-weight:700;color:#64748b}
.word-hint{text-align:center;font-size:1.15rem;font-weight:700;color:#94a3b8;animation:bounce 2.5s ease-in-out infinite}
/* SENTS */
.step-sents{display:flex;flex-direction:column;gap:2rem}
.sent-list{display:flex;flex-direction:column;gap:1.2rem}
.sent-card{background:white;border-radius:2rem;padding:1.6rem 1.8rem;border:2px solid #f8fafc;position:relative;overflow:hidden;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;box-shadow:0 6px 20px rgba(0,0,0,.07)}
.sent-blob{position:absolute;bottom:-2rem;right:-2rem;width:8rem;height:8rem;border-radius:50%;opacity:.05;pointer-events:none}
.sent-body{flex:1;min-width:200px;position:relative}
.sent-pair{display:inline-block;padding:.22rem .9rem;border-radius:9999px;font-size:clamp(.9rem,1.8vw,1.25rem);font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.7rem;border:1px solid}
.sent-text{font-size:clamp(1.3rem,2.8vw,2.1rem);font-weight:900;color:#334155;line-height:1.55;margin-bottom:.4rem}
.sent-zh{font-size:clamp(.9rem,2vw,1.3rem);font-weight:700;color:#94a3b8}
.sent-btns{display:flex;flex-direction:column;gap:.55rem;flex-shrink:0}
.sent-play{padding:.75rem 1rem;border-radius:1rem;cursor:pointer;border:none;transition:all .2s;line-height:0;display:flex;align-items:center;gap:.45rem;font-size:.85rem;font-weight:800;white-space:nowrap}
.sent-play:hover{transform:scale(1.05)}
.hi-o{color:#ea580c;font-weight:900;text-decoration:underline;text-decoration-color:#fdba74;text-underline-offset:4px}
.hi-v{color:#7c3aed;font-weight:900;text-decoration:underline;text-decoration-color:#c4b5fd;text-underline-offset:4px}
.pulse-o{animation:pulseO .85s ease-in-out infinite}
.pulse-v{animation:pulseV .85s ease-in-out infinite}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="page active">
  <div class="cloud" style="width:160px;height:50px;top:7%;left:4%;animation-duration:4s;animation-name:cloudDrift;animation-direction:alternate"></div>
  <div class="cloud" style="width:110px;height:36px;top:13%;right:7%;animation-duration:5.5s;animation-delay:1s;animation-name:cloudDrift;animation-direction:alternate"></div>

/* ==================================================
   STATE & TTS
================================================== */
var cur = null, step = 0, speakingId = null;
var synth = window.speechSynthesis;
var voiceList = [];
function loadVoices(){ voiceList = synth.getVoices(); }
loadVoices();
if(synth.onvoiceschanged !== undefined){ synth.onvoiceschanged = loadVoices; }

function pickVoice(lang) {
  var list = synth.getVoices();
  if(list.length === 0) list = voiceList;
  // Priority 1: exact lang match + preferred engine
  var preferred = ['Google','Microsoft','Premium','Natural','Samantha'];
  for(var p=0;p<preferred.length;p++){
    for(var i=0;i<list.length;i++){
      if(list[i].lang === lang && list[i].name.indexOf(preferred[p])>=0) return list[i];
    }
  }
  // Priority 2: exact lang match (any engine)
  for(var i=0;i<list.length;i++){
    if(list[i].lang === lang) return list[i];
  }
  // Priority 3: same language prefix (e.g. zh-CN as fallback for zh-TW)
  var pre = lang.slice(0,2);
  for(var i=0;i<list.length;i++){
    if(list[i].lang.slice(0,2) === pre) return list[i];
  }
  return null;
}

function doSpeak(text, id, lang) {
  if(!lang) lang = 'en-US';
  if(speakingId === id){ synth.cancel(); updateSpeakUI(null); return; }
  synth.cancel();
  updateSpeakUI(id);

  function _speak(){
    var u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = (lang === 'zh-TW') ? 0.85 : 0.82;
    u.pitch = 1.0;
    var voice = pickVoice(lang);
    if(voice){ u.voice = voice; u.lang = voice.lang; }
    u.onend  = function(){ updateSpeakUI(null); };
    u.onerror = function(){ updateSpeakUI(null); };
    synth.speak(u);
  }

  // If voices not loaded yet, wait for them then speak
  var list = synth.getVoices();
  if(list.length > 0){
    _speak();
  } else {
    synth.onvoiceschanged = function(){
      synth.onvoiceschanged = null;
      voiceList = synth.getVoices();
      _speak();
    };
    // Safety timeout fallback
    setTimeout(function(){
      if(speakingId === id){ voiceList = synth.getVoices(); _speak(); }
    }, 500);
  }
}

function updateSpeakUI(id) {
  speakingId = id;
  var d = cur ? DATA[cur] : null;
  var btns = document.querySelectorAll('[data-spk]');
  for(var i=0;i<btns.length;i++){
    var btn = btns[i];
    var bid = btn.getAttribute('data-spk');
    var type = btn.getAttribute('data-type');
    var active = (bid === id);
    if(!d){ continue; }
    if(type==='rule'){
      btn.style.background = active ? d.accent : 'white';
      btn.style.color = active ? 'white' : d.accent;
      if(active){ btn.classList.add(d.pulse); } else { btn.classList.remove('pulse-o'); btn.classList.remove('pulse-v'); }
      var isZhRule = bid.indexOf('-zh') >= 0;
      var ruleLabel = isZhRule
        ? '\uD83C\uDDF9\uD83C\uDDFC \u807D\u4E2D\u6587\u8AAA\u660E'
        : '\uD83C\uDDFA\uD83C\uDDF8 \u807D\u82F1\u6587\u793A\u7BC4';
      btn.innerHTML = active
        ? '<span class="spin" style="font-size:1.2rem;margin-right:.4rem">\u21BB</span>\u64AD\u653E\u4E2D\u2026'
        : svgV(26) + ' ' + ruleLabel;
    } else if(type==='word'){
      btn.style.background = active ? d.accent : (d.theme==='o'?'#fff7ed':'#f5f3ff');
      btn.style.color = active ? 'white' : d.accent;
      if(active){ btn.classList.add(d.pulse); } else { btn.classList.remove('pulse-o'); btn.classList.remove('pulse-v'); }
      btn.innerHTML = active ? '<span class="spin" style="font-size:1rem">\u21BB</span>' : svgV(22);
      var card = btn.parentNode;
      if(card) card.style.borderColor = active ? d.accent : '#f1f5f9';
    } else if(type==='sent'){
      btn.style.background = active ? d.accent : (d.theme==='o'?'#fff7ed':'#f5f3ff');
      btn.style.color = active ? 'white' : d.accent;
      if(active){ btn.classList.add(d.pulse); } else { btn.classList.remove('pulse-o'); btn.classList.remove('pulse-v'); }
      var isZh = bid.indexOf('-zh') >= 0;
      var label = isZh ? '\u4E2D\u6587' : '\u82F1\u6587';
      btn.innerHTML = active
        ? '<span class="spin" style="font-size:.95rem">\u21BB</span> \u64AD\u653E\u4E2D\u2026'
        : svgV(20) + ' ' + label;
    }
  }
}

function svgV(s){
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
}

document.getElementById('card-short_a').addEventListener('click', function(){ startLesson('short_a'); });
document.getElementById('card-long_a').addEventListener('click',  function(){ startLesson('long_a');  });
document.getElementById('backBtn').addEventListener('click', goHome);
document.getElementById('prevBtn').addEventListener('click', prevStep);
document.getElementById('nextBtn').addEventListener('click', nextStep);
var tabBtns = document.querySelectorAll('.tab-btn');
for(var tb=0;tb<tabBtns.length;tb++){
  (function(btn){
    btn.addEventListener('click', function(){ goStep(parseInt(btn.getAttribute('data-step'))); });
  })(tabBtns[tb]);
}

function startLesson(key){
  cur = key; step = 0;
  document.getElementById('home').classList.remove('active');
  var L = document.getElementById('lesson');
  var d = DATA[key];
  L.className = 'page active lesson-bg-' + d.theme;
  L.style.display = 'flex';
  render();
}
function goHome(){
  synth.cancel(); updateSpeakUI(null);
  document.getElementById('lesson').classList.remove('active');
  document.getElementById('lesson').style.display = 'none';
  document.getElementById('home').classList.add('active');
}
function nextStep(){ if(step<2){ step++; render(); } else { goHome(); } }
function prevStep(){ if(step>0){ step--; render(); } else { goHome(); } }
function goStep(n){ step=n; render(); }

/* ==================================================
   RENDER
================================================== */
var STEP_NAMES = ['\u767C\u97F3\u898F\u5247','\u7CBE\u9078\u55AE\u5B57','\u4F8B\u53E5\u7DF4\u7FD2'];

function render(){
  synth.cancel(); updateSpeakUI(null);
  var d = DATA[cur];
  // back btn
  var bb = document.getElementById('backBtn');
  bb.style.color = d.accent; bb.style.borderColor = d.accent;
  // dots
  var ids = ['dot0','dot1','dot2'];
  for(var i=0;i<3;i++){
    var el = document.getElementById(ids[i]);
    el.style.background = (i<=step) ? d.accent : '#e5e7eb';
    el.style.width = (i===step) ? '40px' : '12px';
  }
  // step label
  var sl = document.getElementById('stepLabel');
  sl.textContent = (step+1)+' / 3 \u2014 '+STEP_NAMES[step];
  sl.style.color = d.accent; sl.style.borderColor = d.accent;
  // header
  var hdr = document.getElementById('lessonHeader');
  hdr.style.background = d.accent;
  document.getElementById('lhEmoji').textContent = d.emoji;
  document.getElementById('lhTitle').textContent = d.title;
  document.getElementById('lhSub').textContent = d.ipa + ' \u2014 ' + STEP_NAMES[step];
  // glow
  document.getElementById('cardGlow').style.background = d.accent;
  // nav btns
  var nb = document.getElementById('nextBtn');
  nb.style.background = d.accent;
  document.getElementById('nextLabel').textContent = step===2 ? '\uD83C\uDF89 \u5B8C\u6210\u672C\u8AB2' : '\u4E0B\u4E00\u9801';
  var pb = document.getElementById('prevBtn');
  pb.style.background = 'white'; pb.style.color = d.accent; pb.style.border = '3px solid '+d.accent;
  document.getElementById('prevLabel').textContent = step===0 ? '\u4E3B\u9078\u55AE' : '\u4E0A\u4E00\u9801';
  // tabs
  var tbs = document.querySelectorAll('.tab-btn');
  for(var i=0;i<tbs.length;i++){
    var on = (i===step);
    tbs[i].style.background = on ? d.accent : 'white';
    tbs[i].style.color = on ? 'white' : d.accent;
    if(on){ tbs[i].classList.add('on'); } else { tbs[i].classList.remove('on'); }
  }
  // content
  var sc = document.getElementById('stepContent');
  if(step===0) sc.innerHTML = buildRule(d);
  else if(step===1) sc.innerHTML = buildWords(d);
  else sc.innerHTML = buildSents(d);
  attachListeners();
}

function attachListeners(){
  var btns = document.querySelectorAll('[data-spk]');
  for(var i=0;i<btns.length;i++){
    (function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        var id   = btn.getAttribute('data-spk');
        var txt  = btn.getAttribute('data-txt');
        var lang = btn.getAttribute('data-lang') || 'en-US';
        doSpeak(txt, id, lang);
      });
    })(btns[i]);
  }
  var wcards = document.querySelectorAll('.word-card');
  for(var i=0;i<wcards.length;i++){
    (function(card){
      card.addEventListener('click', function(){
        var spkBtn = card.querySelector('[data-spk]');
        if(spkBtn) spkBtn.click();
      });
    })(wcards[i]);
  }
}

/* ==================================================
   BUILD HTML

function buildRule(d){
  var dc = '';
  for(var i=0;i<d.details.length;i++){
    dc += '<div class="detail-card">' +
      '<div class="detail-label" style="color:'+d.accent+'">'+d.details[i].label+'</div>' +
      '<div class="detail-val">'+d.details[i].val+'</div></div>';
  }
  return '<div class="step-rule zoom-in">' +
    '<div class="ipa-badge" style="background:'+d.accent+'">'+
      '<div class="ipa-main">'+d.ipa+'</div>'+
      '<div class="ipa-sub">'+d.title+'</div>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:1rem;max-width:800px;width:100%">'+
      '<p class="rule-text">'+d.rule+'</p>'+
      '<div class="rule-hint" style="background:'+d.lbg+';border-color:'+d.accent+'">\uD83D\uDCA1 '+d.ruleHint+'</div>'+
    '</div>'+
    '<div class="detail-grid">'+dc+'</div>'+
    '<div style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center">'+
      '<button class="speak-btn" data-spk="rule-zh" data-type="rule" data-txt="'+esc(d.rule)+'" data-lang="zh-TW" '+
        'style="background:white;color:'+d.accent+';border-color:'+d.accent+'">'+
        svgV(26)+' \uD83C\uDDF9\uD83C\uDDFC \u807D\u4E2D\u6587\u8AAA\u660E'+
      '</button>'+
      '<button class="speak-btn" data-spk="rule-en" data-type="rule" data-txt="'+esc(d.ruleSpeak)+'" data-lang="en-US" '+
        'style="background:white;color:'+d.accent+';border-color:'+d.accent+'">'+
        svgV(26)+' \uD83C\uDDFA\uD83C\uDDF8 \u807D\u82F1\u6587\u793A\u7BC4'+
      '</button>'+
    '</div>'+
  '</div>';
}

function buildWords(d){
  var gc = '';
  for(var i=0;i<d.words.length;i++){
    var w = d.words[i];
    gc += '<div class="word-card slide-r d'+i+'">' +
      '<button class="word-speak" data-spk="w'+i+'" data-type="word" data-txt="'+esc(w.w)+'" data-lang="en-US" '+
        'style="background:'+d.lbg+';color:'+d.accent+'">'+svgV(22)+'</button>'+
      '<div class="word-icon">'+w.e+'</div>'+
      '<div class="word-en" style="color:'+d.accent+'">'+w.w+'</div>'+
      '<div class="word-ipa">'+w.p+'</div>'+
      '<div class="word-zh">'+w.zh+'</div>'+
    '</div>';
  }
  return '<div class="step-words slide-r">'+
    '<h2 class="step-title" style="color:'+d.accent+'">'+
      '<svg xmlns="http://www.w3.org/2000/svg" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"/></svg>'+
      ' \u7CBE\u9078\u55AE\u5B57\u5361</h2>'+
    '<div class="word-grid">'+gc+'</div>'+
    '<p class="word-hint">\uD83D\uDC46 \u9EDE\u64CA\u55AE\u5B57\u5361\u807D\u767C\u97F3\uff01</p>'+
  '</div>';
}

function buildSents(d){
  var sc = '';
  for(var i=0;i<d.sents.length;i++){
    var s = d.sents[i];
    sc += '<div class="sent-card">'+
      '<div class="sent-blob" style="background:'+d.accent+'"></div>'+
      '<div class="sent-body">'+
        '<div class="sent-pair" style="background:'+d.lbg+';color:'+d.accent+';border-color:'+d.accent+'">'+s.pair+'</div>'+
        '<p class="sent-text">'+hlSent(s.sent, s.targets, d.hi)+'</p>'+
        '<p class="sent-zh">'+s.zh+'</p>'+
      '</div>'+
      '<div class="sent-btns">'+
        '<button class="sent-play" data-spk="'+s.id+'-en" data-type="sent" data-txt="'+esc(s.sent)+'" data-lang="en-US" '+
          'style="background:'+d.lbg+';color:'+d.accent+'">'+
          svgV(20)+' \u82F1\u6587'+
        '</button>'+
        '<button class="sent-play" data-spk="'+s.id+'-zh" data-type="sent" data-txt="'+esc(s.zh)+'" data-lang="zh-TW" '+
          'style="background:'+d.lbg+';color:'+d.accent+'">'+
          svgV(20)+' \u4E2D\u6587'+
        '</button>'+
      '</div>'+
    '</div>';
  }
  return '<div class="step-sents slide-u">'+
    '<h2 class="step-title" style="color:'+d.accent+'">'+
      '<svg xmlns="http://www.w3.org/2000/svg" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+
      ' \u5BB9\u6613\u6DF7\u6DE1\u4F8B\u53E5</h2>'+
    '<div class="sent-list">'+sc+'</div>'+
  '</div>';
}

function hlSent(sent, targets, cls){
  var words = sent.split(' ');
  var out = [];
  for(var i=0;i<words.length;i++){
    var w = words[i];
    var clean = w.toLowerCase().replace(/[^a-z]/g,'');
    var isT = false;
    for(var j=0;j<targets.length;j++){ if(targets[j]===clean){ isT=true; break; } }
    out.push(isT ? '<span class="'+cls+'">'+w+'</span>' : w);
  }
  return out.join(' ');
}

function esc(s){ return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
